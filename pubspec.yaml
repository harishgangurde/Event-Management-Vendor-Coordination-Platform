name: eventtoria
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  animations: ^2.0.11
  cloud_firestore: ^6.0.2
  firebase_auth: ^6.1.0
  firebase_core: ^4.1.1
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  google_fonts: ^6.3.2
  google_sign_in: ^7.2.0
  provider: ^6.1.5+1
  flutter_launcher_icons: ^0.14.4
  image_picker: ^1.1.1
  dotted_border: ^2.1.0
  lucide_icons_flutter: ^3.1.2
  shared_preferences: ^2.5.3


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/icons/AI_logo.jpg

# flutter_launcher_icons configuration should be at the top level, not under flutter
flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
